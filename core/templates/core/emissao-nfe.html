{% extends 'base.html' %}

{% block title %}NFe - Emissão{% endblock %}

{% block conteudo %}
<div id="overlay">
    <div class="cv-spinner">
        <div class="spinner-border text-warning" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
</div>
<div class="container mt-3" style="width: 45%">
    <form method="POST">
        {% csrf_token %}
        <select class="form-select mb-3" id="empresas" name="empresa" required>
            <option selected value="">Selecione uma empresa</option>
            {% for e in empresas %}
            <option value="{{ e.empresa_filial }}">{{ e.mnemonico }}</option>
            {% endfor %}
        </select>

        <div class="input-group mb-3">
            <input type="number" class="form-control" name="pedido" placeholder="Pedido" required>
            <button class="btn btn-primary" type="submit" id="consultar">Consultar</button>
        </div>
    </form>

    <div class="mt-3" id="resultado"></div>
</div>
{% endblock %}

{% block scripts %}
<script type="text/javascript">
    var url = "{% url 'core_api_emissao_nfe' %}";
</script>
<script src="/static/js/emissao-nfe.js"></script>
{% endblock %}
